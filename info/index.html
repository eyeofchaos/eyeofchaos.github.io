<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Info</title>
<link rel="icon" href="/images/favicon.svg?v=1.0" type="image/svg+xml">
<link rel="apple-touch-icon" href="/images/apple-touch-icon.png?v=1.0">
<link rel="stylesheet" href="/css/bootstrap-5.3.8/bootstrap.min.css">
</head>
<body>

<main>
  <section class="my-5">
    <div class="container">
      <div class="row">
        <div class="col">

          <h1 class="mb-5 text-center">Info</h1>

          <table class="table mx-auto text-break" style="max-width: 960px;">
            <thead>
              <tr>
                <th style="width: 40%; min-width: 100px;">Property</th>
                <th>Value</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td style="width: 40%; min-width: 100px;">Time</td>
                <td><local-time></local-time></td>
              </tr>
              <tr>
                <td style="width: 40%; min-width: 100px;">User agent</td>
                <td><user-agent></user-agent></td>
              </tr>
            </tbody>
          </table>

        </div>
      </div>
    </div>
  </section>
</main>

<script>
if(!customElements.get('local-time')){class e extends HTMLElement{constructor(){super()}connectedCallback(){const e=this.attachShadow({mode:'open'}),t=new Date;e.innerHTML=t.toLocaleString()}}customElements.define('local-time',e)}
if(!customElements.get('user-agent')){class e extends HTMLElement{constructor(){super()}connectedCallback(){this.attachShadow({mode:'open'}).innerHTML=navigator.userAgent}}customElements.define('user-agent',e)}
</script>

</body>
</html>
